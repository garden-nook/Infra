# front
server {
    listen 80;
    server_name stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    # Заглушка
    location / {
        default_type text/html;
        return 503 '<html><body><h1>Frontend is not deployed yet</h1><p>Stage environment for garden-nook</p><ul><li><a href="https://api.stage.192-144-12-78.nip.io/swagger/index.html">API Swagger</a></li><li><a href="https://pg.stage.192-144-12-78.nip.io">pgAdmin</a></li></ul></body></html>';
    }
}

# back
server {
    listen 80;
    server_name api.stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    location / {
        proxy_pass http://stage-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }
}

# pgAdmin
server {
    listen 80;
    server_name pg.stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pg.stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    location / {
        proxy_pass http://stage-pgadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header X-Script-Name /;
        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}