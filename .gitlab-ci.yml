stages:
  - validate
  - deploy-nginx
  - certs
  - deploy-dev
  - deploy-stage

variables:
  VPS_USER: admin

validate:
  stage: validate
  image: alpine:3.19
  before_script:
    - apk add --no-cache nginx
  script:
    - nginx -t -c $CI_PROJECT_DIR/nginx/nginx.conf
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - changes:
        - nginx/**/*

deploy-nginx:
  stage: deploy-nginx
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - rsync -avz --delete nginx/ $VPS_USER@$VPS_HOST:/opt/garden-nook/nginx/
    - rsync -avz docker/nginx/docker-compose.yml $VPS_USER@$VPS_HOST:/opt/garden-nook/docker/nginx/docker-compose.yml
    - ssh $VPS_USER@$VPS_HOST "docker exec nginx nginx -t && docker exec nginx nginx -s reload"
  environment:
    name: nginx
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - nginx/**/*
        - docker/nginx/**/*

renew-certificates:
  stage: certs
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - ssh $VPS_USER@$VPS_HOST "VPS_IP=$VPS_HOST CERT_EMAIL=$CERT_EMAIL /opt/garden-nook/scripts/issue-certs.sh"
  environment:
    name: certificates
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - scripts/issue-certs.sh
      when: manual
  allow_failure: false

deploy-dev-infra:
  stage: deploy-dev
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - rsync -avz docker/dev/ $VPS_USER@$VPS_HOST:/opt/garden-nook/docker/dev/
    - ssh $VPS_USER@$VPS_HOST "cd /opt/garden-nook/docker/dev && docker compose up -d --remove-orphans"
  environment:
    name: dev-infra
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - docker/dev/docker-compose.yml
        - docker/dev/.env
  when: manual

deploy-stage-infra:
  stage: deploy-stage
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client rsync
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
  script:
    - rsync -avz docker/stage/ $VPS_USER@$VPS_HOST:/opt/garden-nook/docker/stage/
    - ssh $VPS_USER@$VPS_HOST "cd /opt/garden-nook/docker/stage && docker compose up -d --remove-orphans"
  environment:
    name: stage-infra
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - changes:
        - docker/stage/docker-compose.yml
        - docker/stage/.env
  when: manual