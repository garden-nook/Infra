# front
server {
    listen 80;
    server_name stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

# front
server {
    listen 443 ssl http2;
    server_name stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    location / {
        proxy_pass http://stage-frontend:80;

        # Буферизация ответов
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;
        
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# back
server {
    listen 80;
    server_name api.stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    location / {
        proxy_pass http://stage-backend:8080;
        
        # Буферизация ответов
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 24k;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;
    }
}

# pgAdmin
server {
    listen 80;
    server_name pg.stage.192-144-12-78.nip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pg.stage.192-144-12-78.nip.io;

    ssl_certificate /etc/nginx/ssl/stage/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/stage/privkey.pem;

    location / {
        proxy_pass http://stage-pgadmin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}