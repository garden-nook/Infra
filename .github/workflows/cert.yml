name: Infrastructure CI/CD

on:
  workflow_dispatch:

jobs:
  renew-certificates:
    name: Renew SSL Certificates
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: certificates
    
    steps:
      - name: Run cert renewal on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo VPS_IP=${{ vars.VPS_HOST }} \
            CERT_EMAIL=noreply@localhost.local \
            /opt/garden-nook/scripts/issue-certs.sh