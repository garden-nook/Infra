services:
  dev-frontend:
    image: elecshen/front:${FRONT_IMAGE_TAG:-dev-latest}
    container_name: dev-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://api.dev.192-144-12-78.nip.io
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  dev-backend:
    image: elecshen/back:${BACK_IMAGE_TAG:-dev-latest}
    container_name: dev-backend
    restart: unless-stopped
    environment:
      - SWAGGER_HOST=${SWAGGER_HOST}
      - SWAGGER_SCHEMES=https
      - SERVER_PORT=8080
      - DB_HOST=dev-db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_USER_TTL_MINUTES=${JWT_USER_TTL_MINUTES}
      - JWT_ADMIN_TTL_MINUTES=${JWT_ADMIN_TTL_MINUTES}
    depends_on:
      dev-db:
        condition: service_healthy
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "--tries=1", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dev-db:
    image: postgis/postgis:17-3.6-alpine
    container_name: dev-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dev-pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dev-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
    volumes:
      - pgadmin:/var/lib/pgadmin
    networks:
      - dev-network

networks:
  dev-network:
    name: dev-network
    driver: bridge

volumes:
  postgres:
  pgadmin: