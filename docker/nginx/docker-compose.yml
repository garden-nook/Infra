services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/garden-nook/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/garden-nook/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/garden-nook/nginx/ssl:/etc/nginx/ssl:ro
      - /opt/garden-nook/nginx/logs:/var/log/nginx
    networks:
      - dev-network
      - stage-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider --header=\"Host: test.io\" http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9443:9443"
    volumes:
      - portainer:/data
      # Доступ к Docker socket для управления всеми контейнерами на хосте
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - dev-network
      - stage-network

networks:
  dev-network:
    external: true
    name: dev-network
  stage-network:
    external: true
    name: stage-network

volumes:
  portainer: