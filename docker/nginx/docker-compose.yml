services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/garden-nook/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /opt/garden-nook/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/garden-nook/nginx/ssl:/etc/nginx/ssl:ro
      - /opt/garden-nook/nginx/logs:/var/log/nginx
    networks:
      - dev-network
      - stage-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  dev-network:
    external: true
    name: dev-network
  stage-network:
    external: true
    name: stage-network